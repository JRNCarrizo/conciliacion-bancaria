spring:
  application:
    name: Consiliacion-Bancaria
  profiles:
    active: local
  servlet:
    multipart:
      max-file-size: 25MB
      max-request-size: 35MB

server:
  port: 8080

app:
  cors:
    allowed-origins: "http://localhost:5173,http://127.0.0.1:5173"
  jwt:
    # Mínimo 32 caracteres (HS256). En producción usar JWT_SECRET en el entorno.
    secret: ${JWT_SECRET:local-dev-only-change-me-32chars-minimum-ok!!}
    expiration-ms: 86400000
  upload:
    # Directorio base (se crea al iniciar). En producción: APP_UPLOAD_BASE_DIR o ruta fija en el servidor.
    base-dir: ${APP_UPLOAD_BASE_DIR:${user.home}/.conciliacion-bancaria/uploads}

---
spring:
  config:
    activate:
      on-profile: local
  datasource:
    url: jdbc:h2:mem:conciliacion;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1
    driver-class-name: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2-console
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: jdbc:mysql://${MYSQL_HOST:localhost}:${MYSQL_PORT:3306}/${MYSQL_DATABASE:conciliacion}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${MYSQL_USER:conciliacion}
    password: ${MYSQL_PASSWORD:conciliacion}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
  flyway:
    enabled: true
